version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: jobstats-db
    restart: always
    environment:
      POSTGRES_USER: jobstats
      POSTGRES_PASSWORD: jobstats123
      POSTGRES_DB: jobstats
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql